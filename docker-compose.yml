services:
  app:
    build: .
    image: nicopelos/appcarc-backend:latest
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/appcarc?replicaSet=rs0
    depends_on:
      - mongo
    volumes:
      - ./:/app:ro

  mongo:
    image: mongo:6.0
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - /mnt/ssd/mongo-data:/data/db
      - ./init-replica.js:/docker-entrypoint-initdb.d/init-replica.js:ro
    environment:
      - MONGO_INITDB_DATABASE=appcarc

  mongo-express:
    image: mongo-express:1.0
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://mongo:27017/appcarc?replicaSet=rs0

