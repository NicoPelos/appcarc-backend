version: '3.8'

services:
  app:
    build: .
    image: nicopelos/appcarc-backend:latest
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/appcarc
    depends_on:
      - mongo
    volumes:
      - ./:/app:ro

  mongo:
    image: mongo:6.0
    restart: unless-stopped
    volumes:
      - /mnt/ssd/mongo-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=appcarc

  mongo-express:
    image: mongo-express:1.0
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo
      - ME_CONFIG_MONGODB_ADMINUSERNAME=
      - ME_CONFIG_MONGODB_ADMINPASSWORD=

volumes:
  mongo-data:
