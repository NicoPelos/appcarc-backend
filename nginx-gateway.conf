server {
  listen 80;

  # Fotos/archivos de socios pueden pesar varios MB (ver fix del límite de
  # multer) — sin esto, este proxy nuevo reintroduciría un 413 antes de
  # llegar al backend.
  client_max_body_size 25m;

  location /admin/ {
    proxy_pass http://superadmin:80;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://app:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
