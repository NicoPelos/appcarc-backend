<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Club Andino Río Cuarto</title>
<style>
  :root {
    --bg: #1A130A;
    --card: rgba(255,255,255,0.12);
    --card-border: rgba(255,255,255,0.2);
    --primary: #D97706;
    --primary-dark: #B45309;
    --text-primary: #FFFBEB;
    --text-secondary: #FDE68A;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  body {
    background: var(--bg) url("assets/login-bg.jpg") center / cover no-repeat fixed;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .logo-backdrop {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    background: rgba(255,255,255,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 8px rgba(0,0,0,0.5);
    margin-bottom: 12px;
  }

  .logo-backdrop img {
    width: 130px;
    height: 130px;
    object-fit: contain;
  }

  h1 {
    color: var(--text-secondary);
    font-size: 17px;
    font-weight: 500;
    text-align: center;
    margin: 0 0 24px;
  }

  .card {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--primary);
    color: #fff;
    text-decoration: none;
    font-weight: 700;
    font-size: 15px;
    padding: 16px 18px;
    border-radius: 14px;
    transition: background-color 0.15s ease, transform 0.15s ease;
  }

  .link-btn:active {
    background: var(--primary-dark);
    transform: scale(0.98);
  }

  .link-btn .icon {
    font-size: 22px;
    line-height: 1;
  }

  .tips {
    color: rgba(255,255,255,0.6);
    font-size: 12px;
    text-align: center;
    margin-top: 20px;
    max-width: 340px;
  }
</style>
</head>
<body>
  <div class="overlay"></div>
  <div class="container">
    <div class="logo-backdrop">
      <img src="assets/logo.png" alt="Club Andino Río Cuarto" />
    </div>
    <h1>Club Andino Río Cuarto</h1>

    <div class="card">
      <a class="link-btn" href="#" target="_blank" rel="noopener">
        <span class="icon">🏔️</span>
        <span>Quiero ser socio</span>
      </a>
      <a class="link-btn" href="#" target="_blank" rel="noopener">
        <span class="icon">🧒</span>
        <span>Escuelita — niños y adolescentes</span>
      </a>
      <a class="link-btn" href="#" target="_blank" rel="noopener">
        <span class="icon">🧗</span>
        <span>Escuela de adultos</span>
      </a>
      <a class="link-btn" href="#" target="_blank" rel="noopener">
        <span class="icon">🥾</span>
        <span>Viajes de trekking</span>
      </a>
    </div>

    <p class="tips">Completá el formulario y nos ponemos en contacto a la brevedad.</p>
  </div>
</body>
</html>
